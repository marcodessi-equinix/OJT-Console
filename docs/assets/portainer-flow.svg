<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="520" rx="36" fill="#0A1320"/>
  <text x="68" y="84" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">Portainer Deployment Flow</text>
  <text x="68" y="122" fill="#A5B4C3" font-family="Segoe UI, Arial, sans-serif" font-size="22">Von GitHub bis zum laufenden Stack in vier klaren Schritten.</text>
  <rect x="64" y="186" width="300" height="220" rx="30" fill="#1D4ED8"/>
  <text x="102" y="250" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">1</text>
  <text x="102" y="304" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Push to GitHub</text>
  <text x="102" y="342" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="19">Repo mit compose.yaml,</text>
  <text x="102" y="368" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="19">Dockerfiles und README</text>
  <rect x="446" y="186" width="300" height="220" rx="30" fill="#0F766E"/>
  <text x="484" y="250" fill="#ECFEFF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">2</text>
  <text x="484" y="304" fill="#ECFEFF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Create Stack</text>
  <text x="484" y="342" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Portainer: Git repo oder</text>
  <text x="484" y="368" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Upload der compose.yaml</text>
  <rect x="828" y="186" width="300" height="220" rx="30" fill="#7C3AED"/>
  <text x="866" y="250" fill="#F5F3FF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">3</text>
  <text x="866" y="304" fill="#F5F3FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Set Variables</text>
  <text x="866" y="342" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="19">Absolute Host-Pfade,</text>
  <text x="866" y="368" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="19">Admin und SMTP setzen</text>
  <rect x="1210" y="186" width="300" height="220" rx="30" fill="#EA580C"/>
  <text x="1248" y="250" fill="#FFF7ED" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">4</text>
  <text x="1248" y="304" fill="#FFF7ED" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Deploy and Verify</text>
  <text x="1248" y="342" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="19">Healthcheck, Dokumentimport</text>
  <text x="1248" y="368" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="19">und Frontend testen</text>
  <path d="M364 296H430" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M746 296H812" stroke="#5EEAD4" stroke-width="8" stroke-linecap="round"/>
  <path d="M1128 296H1194" stroke="#C4B5FD" stroke-width="8" stroke-linecap="round"/>
