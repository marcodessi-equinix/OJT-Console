services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-9130}}
      ADMIN_IDENTIFIER: ${ADMIN_IDENTIFIER:-admin}
      ADMIN_NAME: ${ADMIN_NAME:-OJT Admin}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      MAIL_FROM: ${MAIL_FROM:-}
      DEFAULT_PRIMARY_RECIPIENT: ${DEFAULT_PRIMARY_RECIPIENT:-}
      DEFAULT_CC_ME: ${DEFAULT_CC_ME:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ENGLISH_DOCUMENTS_ROOT: /app/source-documents/English
      GERMAN_DOCUMENTS_ROOT: /app/source-documents/German
    volumes:
      - type: volume
        source: backend_data
        target: /app/backend/data
      - type: bind
        source: ${ENGLISH_DOCUMENTS_SOURCE:-./English}
        target: /app/source-documents/English
        read_only: true
        bind:
          create_host_path: true
          selinux: z
      - type: bind
        source: ${GERMAN_DOCUMENTS_SOURCE:-./German}
        target: /app/source-documents/German
        read_only: true
        bind:
          create_host_path: true
          selinux: z
    expose:
      - "4000"
    networks:
      npm_proxy:
        aliases:
          - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9130}:80"
    networks:
      npm_proxy:
        aliases:
          - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  npm_proxy:
    external: true
    name: ${NPM_NETWORK:-nginx-proxy-manager_default}

volumes:
  backend_data:
    name: ${BACKEND_DATA_VOLUME:-ojt-console-backend-data}